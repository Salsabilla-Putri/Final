<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Public Generator Dashboard</title>
  <script src="js/auth-guard.js"></script>
  <link rel="stylesheet" href="css/public-view.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <h1>Generator Public Dashboard</h1>
        <p>Simple real-time status for all users</p>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </header>

    <section id="loading" class="state">Loading latest generator status...</section>
    <section id="error" class="state error hidden"></section>

    <section id="content" class="hidden">
      <div class="cards">
        <article class="card">
          <h2>Power Status</h2>
          <p id="powerStatus">-</p>
        </article>
        <article class="card">
          <h2>Generator Condition</h2>
          <p id="generatorCondition">-</p>
        </article>
        <article class="card">
          <h2>Fuel Status</h2>
          <p id="fuelStatus">-</p>
        </article>
        <article class="card">
          <h2>Engine Activity</h2>
          <p id="engineActivity">-</p>
        </article>
      </div>

      <div class="summary">
        <div>
          <span>Estimated daily usage</span>
          <strong id="dailyUsage">0 kWh</strong>
        </div>
        <div>
          <span>Estimated daily cost</span>
          <strong id="estimatedCost">Rp 0</strong>
        </div>
        <div>
          <span>Last updated</span>
          <strong id="lastUpdated">-</strong>
        </div>
      </div>

      <section>
        <h2>Alerts</h2>
        <div id="alerts" class="alerts"></div>
      </section>
    </section>
  </main>

  <script src="js/public-view.js"></script>
</body>
</html>
