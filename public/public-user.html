<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>GENSYS — Pengaturan Akun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="js/auth-guard.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/typography.css">

  <style>
    .profile-wrap { display: flex; justify-content: center; margin-top: 30px; }
    .profile-card { width: 100%; max-width: 500px; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #475569; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #1745a5; }
    .form-group input[readonly] { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }
    .btn-save { width: 100%; padding: 12px; background: #1745a5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-save:hover { background: #11327a; }
    .alert-msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
  </style>
</head>
<body>

  <div class="sidebar-overlay"></div>
  <button class="mobile-menu-toggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Pengaturan Akun</div>
      <div class="user-info" style="cursor: default;">
         <i class="fas fa-user"></i> <span id="topbar-username">Pengguna</span>
      </div>
    </div>

    <div class="profile-wrap">
      <div class="profile-card">
          <div style="text-align: center; margin-bottom: 20px;">
              <h2 style="color: #1e293b; margin: 0;">Profil Saya</h2>
              <p style="color: #64748b; font-size: 14px;">Perbarui informasi akun Anda</p>
          </div>

          <div id="status-msg" class="alert-msg"></div>

          <div class="form-group">
              <label>Device ID (Terhubung)</label>
              <input type="text" id="prof-device" readonly>
          </div>
          <div class="form-group">
              <label>Nama Lengkap</label>
              <input type="text" id="prof-name" required>
          </div>
          <div class="form-group">
              <label>Alamat Email</label>
              <input type="email" id="prof-email" required>
          </div>
          <div class="form-group">
              <label>Password Baru (Opsional)</label>
              <input type="password" id="prof-password" placeholder="Kosongkan jika tidak ingin mengubah password">
          </div>

          <button id="btn-save" class="btn-save"><i class="fas fa-save"></i> Simpan Perubahan</button>

          <div style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 15px; text-align: center;">
              <button onclick="logout()" style="background: none; border: none; color: #ef4444; font-weight: 600; cursor: pointer; padding: 10px;">
                  <i class="fas fa-sign-out-alt"></i> Sign Out
              </button>
          </div>
      </div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
      const currentUsername = localStorage.getItem('username');
      document.getElementById('topbar-username').innerText = currentUsername || 'Pengguna';

      function showMessage(msg, isSuccess) {
          const el = document.getElementById('status-msg');
          el.innerText = msg;
          el.className = `alert-msg ${isSuccess ? 'alert-success' : 'alert-error'}`;
          el.style.display = 'block';
          setTimeout(() => el.style.display = 'none', 5000);
      }

      // Ambil data profil dari database saat dimuat
      async function loadProfile() {
          try {
              const res = await fetch(`/api/users/profile?username=${encodeURIComponent(currentUsername)}`);
              const json = await res.json();
              if (json.success) {
                  document.getElementById('prof-name').value = json.data.name;
                  document.getElementById('prof-email').value = json.data.email;
                  document.getElementById('prof-device').value = json.data.deviceId;
              }
          } catch (e) {
              console.error("Gagal memuat profil:", e);
          }
      }

      // Simpan perubahan profil
      document.getElementById('btn-save').addEventListener('click', async () => {
          const btn = document.getElementById('btn-save');
          const newName = document.getElementById('prof-name').value;
          const newEmail = document.getElementById('prof-email').value;
          const newPassword = document.getElementById('prof-password').value;

          btn.innerText = 'Menyimpan...';
          btn.disabled = true;

          try {
              const res = await fetch('/api/users/profile', {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      currentName: currentUsername,
                      name: newName,
                      email: newEmail,
                      password: newPassword ? newPassword : null
                  })
              });
              const json = await res.json();
              
              if (json.success) {
                  showMessage('Profil berhasil diperbarui!', true);
                  // Update username di localStorage agar session tetap valid
                  localStorage.setItem('username', json.user.name);
                  document.getElementById('topbar-username').innerText = json.user.name;
                  document.getElementById('prof-password').value = ''; // Reset form password
              } else {
                  showMessage(json.message || 'Gagal memperbarui profil.', false);
              }
          } catch (e) {
              showMessage('Terjadi kesalahan koneksi.', false);
          } finally {
              btn.innerHTML = '<i class="fas fa-save"></i> Simpan Perubahan';
              btn.disabled = false;
          }
      });

      function logout() {
          ['isLoggedIn','userRole','hasLoginSession','username'].forEach(k => localStorage.removeItem(k));
          window.location.href = 'login.html';
      }

      window.onload = loadProfile;
  </script>
</body>
</html>
