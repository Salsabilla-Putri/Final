<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GENSYS — User Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="js/auth-guard.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/typography.css">

  <style>
    /* ==============================================================
       PAKSA TOPBAR MENJADI SANGAT KECIL (ULTRA-SLIM)
       ============================================================== */
    .topbar { 
        min-height: 44px !important; /* Tinggi dipangkas habis */
        padding: 5px 16px !important; /* Ruang atas-bawah ditipiskan */
        border-radius: 12px !important; 
    }
    .topbar-title { 
        font-size: 0.95rem !important; /* Judul lebih kecil */
    }
    .user-info { 
        padding: 4px 12px !important; /* Tombol user diperkecil */
        font-size: 0.75rem !important; 
    }

    @media (max-width: 768px) {
        .topbar { 
            min-height: 40px !important; /* Di HP jadi sangat tipis */
            padding: 5px 10px 5px 48px !important; 
            flex-wrap: nowrap !important; 
        }
        .topbar-title { 
            font-size: 0.85rem !important; 
        }
        .user-info { 
            font-size: 0.7rem !important; 
            padding: 3px 10px !important; 
        }
    }
    
    @media (max-width: 520px) {
        .user-info span { display: none !important; }
        .user-info { 
            border-radius: 50% !important; 
            padding: 5px !important; 
            justify-content: center !important; 
            width: 28px !important;  /* Ikon bulat sangat kecil */
            height: 28px !important; 
        }
        .user-info i { margin: 0 !important; font-size: 12px !important; }
    }

    /* ==============================================================
       STYLING SENADA DENGAN user.html (Avatar, Badge, Info List)
       ============================================================== */
    .profile-header {
        text-align: center;
        margin-bottom: 25px;
    }
    .profile-img-container {
        width: 120px;
        height: 120px;
        margin: 0 auto 15px;
        position: relative;
    }
    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .role-badge {
        background: #1745a5;
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
        margin-top: 5px;
        text-transform: capitalize;
    }
    
    .info-list {
        margin-top: 20px;
        text-align: left;
    }
    .info-item {
        padding: 12px 0;
        border-bottom: 1px solid #f1f5f9;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { 
        color: #64748b; 
        font-weight: 500; 
        font-size: 13px; 
        margin-bottom: 6px; 
        display: block; 
    }
    .info-input { 
        width: 100%; 
        border: 1px solid transparent; 
        padding: 8px 12px; 
        border-radius: 6px; 
        font-size: 14px; 
        color: #1e293b; 
        font-weight: 600; 
        outline: none; 
        background: #f8fafc; 
        transition: 0.2s; 
    }
    .info-input:focus { border-color: #1745a5; background: #fff; box-shadow: 0 0 0 2px rgba(23,69,165,0.1); }
    .info-input[readonly] { background: transparent; color: #64748b; border: none; padding-left: 0; font-weight: 600; }
    
    .section-divider {
        margin-top:25px; margin-bottom:10px; font-size:11px; font-weight:700; 
        color:#94a3b8; text-transform:uppercase; border-bottom:2px solid #e2e8f0; padding-bottom:5px;
    }

    .logout-area {
        margin-top: 30px;
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
    }

    .btn-save { 
        background: #1745a5; color: white; width: 100%; padding: 12px; 
        font-size: 14px; border: none; border-radius: 8px; cursor: pointer; 
        font-weight: 600; margin-top: 15px; 
    }
    .btn-save:hover { background: #11327a; }

    .alert-msg { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; text-align: center; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
  </style>
</head>
<body>

  <div class="container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      
      <div class="topbar">
        <div class="topbar-title">Account Settings</div>
        <div class="user-info" style="cursor: default;">
           <i class="fas fa-user"></i> <span id="topbar-username">User</span>
        </div>
      </div>

      <div style="display: flex; justify-content: center; margin-top: 20px;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 30px; margin-bottom: 40px;">
            
            <div class="profile-header">
                <div class="profile-img-container">
                    <img id="prof-avatar" src="https://ui-avatars.com/api/?name=Pengguna&background=1745a5&color=fff&size=128" alt="Profile" class="profile-img">
                </div>
                <h2 id="display-name" style="margin: 0; color: #1e293b;">Memuat...</h2>
                <div class="role-badge" id="display-role">Masyarakat</div>
            </div>

            <div id="status-msg" class="alert-msg"></div>

            <div class="info-list">
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-microchip margin-right-5"></i> Device ID</span>
                    <input type="text" id="prof-device" class="info-input" readonly>
                </div>
                
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-envelope margin-right-5"></i> Alamat Email</span>
                    <input type="email" id="prof-email" class="info-input">
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fas fa-id-badge margin-right-5"></i> Nama Lengkap</span>
                    <input type="text" id="prof-name" class="info-input">
                </div>

                <div class="section-divider">Password Settings</div>
                
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-lock"></i> Old Password</span>
                    <input type="password" id="prof-old-password" class="info-input" placeholder="Wajib diisi jika ingin ganti password">
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fas fa-key"></i> New Password</span>
                    <input type="password" id="prof-new-password" class="info-input" placeholder="Kosongkan jika tidak ada perubahan">
                </div>
            </div>

            <button id="btn-save" class="btn-save"><i class="fas fa-save"></i> Save Changes</button>

            <div class="logout-area">
                <button onclick="handleLogout()" class="btn btn-del" style="width: 100%; padding: 12px; font-size: 14px; background: transparent; color: #ef4444; border: 1px solid #ef4444;">
                    <i class="fas fa-sign-out-alt"></i> Sign Out Session
                </button>
            </div>

        </div>
      </div>

    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
      const currentUsername = localStorage.getItem('username');
      document.getElementById('topbar-username').innerText = currentUsername || 'Pengguna';

      function showMessage(msg, isSuccess) {
          const el = document.getElementById('status-msg');
          el.innerText = msg;
          el.className = `alert-msg ${isSuccess ? 'alert-success' : 'alert-error'}`;
          el.style.display = 'block';
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => el.style.display = 'none', 5000);
      }

      async function loadProfile() {
          try {
              const res = await fetch(`/api/users/profile?username=${encodeURIComponent(currentUsername)}`);
              const json = await res.json();
              if (json.success) {
                  const u = json.data;
                  document.getElementById('prof-name').value = u.name;
                  document.getElementById('prof-email').value = u.email;
                  document.getElementById('prof-device').value = u.deviceId || 'GEN-TRACK-01';
                  document.getElementById('display-name').innerText = u.name;
                  document.getElementById('display-role').innerText = u.role;
                  document.getElementById('prof-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=1745a5&color=fff&size=128`;
              }
          } catch (e) { console.error("Gagal memuat profil:", e); }
      }

      document.getElementById('btn-save').addEventListener('click', async () => {
          const btn = document.getElementById('btn-save');
          const name = document.getElementById('prof-name').value;
          const email = document.getElementById('prof-email').value;
          const oldPass = document.getElementById('prof-old-password').value;
          const newPass = document.getElementById('prof-new-password').value;

          if (newPass && !oldPass) {
              return showMessage('Mohon masukkan password lama untuk memverifikasi perubahan.', false);
          }

          btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Menyimpan...';
          btn.disabled = true;

          try {
              const res = await fetch('/api/users/profile', {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      currentName: currentUsername,
                      name: name,
                      email: email,
                      oldPassword: oldPass,
                      newPassword: newPass ? newPass : null
                  })
              });
              const json = await res.json();
              
              if (json.success) {
                  showMessage('Profil berhasil diperbarui!', true);
                  localStorage.setItem('username', json.user.name);
                  document.getElementById('topbar-username').innerText = json.user.name;
                  document.getElementById('display-name').innerText = json.user.name;
                  document.getElementById('prof-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(json.user.name)}&background=1745a5&color=fff&size=128`;
                  
                  // Kosongkan form password setelah berhasil
                  document.getElementById('prof-old-password').value = '';
                  document.getElementById('prof-new-password').value = '';
              } else {
                  showMessage(json.message || 'Gagal memperbarui profil.', false);
              }
          } catch (e) {
              showMessage('Kesalahan pada jaringan.', false);
          } finally {
              btn.innerHTML = '<i class="fas fa-save"></i> Simpan Perubahan';
              btn.disabled = false;
          }
      });

      window.onload = loadProfile;
  </script>
</body>
</html>
