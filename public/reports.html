<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="js/auth-guard.js"></script> -->
    <title>GENSYS — Engine Activity Summary</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="css/typography.css">

    <!-- CBM Panel Styles (inline supaya tidak perlu file CSS baru) -->
    <style>
        .data-source-notice {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            background: #f0f9ff;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
        .data-source-notice.notice-success  { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
        .data-source-notice.notice-warning  { background:#fffbeb; color:#b45309; border-color:#fde68a; }

        #chartDescription {
            font-size: 12px;
            color: #64748b;
            padding: 6px 0 2px;
            min-height: 18px;
        }

        /* ── CBM Panel ── */
        #cbmPanel {
            font-family: inherit;
        }
        #cbmPanel .cbm-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 1px 6px rgba(0,0,0,.05);
        }
        #cbmPanel .cbm-sec-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        #cbmPanel .cbm-tag {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        #cbmPanel .cbm-btn {
            padding: 7px 14px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            transition: opacity .15s;
        }
        #cbmPanel .cbm-btn:hover { opacity: .88; }
        #cbmPanel .cbm-btn:disabled { opacity: .5; cursor: default; }
        #cbmPanel table.cbm-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
        #cbmPanel table.cbm-tbl th {
            padding: 8px 10px;
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        #cbmPanel table.cbm-tbl td {
            padding: 9px 10px;
            border-top: 1px solid #f1f5f9;
            color: #374151;
        }
        .cbm-finding-card { border-radius: 10px; padding: 13px 15px; margin-bottom: 9px; }
        .cbm-mini-stat { background: #fff; border-radius: 7px; padding: 6px 8px; border: 1px solid #f1f5f9; }
        .cbm-bar-track { background: #e2e8f0; border-radius: 4px; height: 4px; margin-top: 4px; width: 80px; margin: 4px auto 0; }
        .cbm-bar-fill  { height: 4px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="topbar">
            <div class="topbar-title">Reports</div>
            <div id="userarea" class="user-info">
                <i class="fas fa-user"></i> <span>Pengguna</span>
            </div>
        </div>

        <!-- Data source notice (diisi oleh reports.js) -->
        <!-- <div id="dataSourceNotice" class="data-source-notice"></div> -->

            <div class="overview-cards">
                <div class="overview-card">
                    <div class="overview-icon primary"><i class="fas fa-clock"></i></div>
                    <div class="overview-content">
                        <div class="overview-value" id="dailyAverage">-- hrs</div>
                        <div class="overview-label">Daily Average</div>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="overview-icon secondary"><i class="fas fa-hourglass-half"></i></div>
                    <div class="overview-content">
                        <div class="overview-value" id="totalHours">-- hrs</div>
                        <div class="overview-label">Total Hours (7 days)</div>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="overview-icon warning"><i class="fas fa-calendar-day"></i></div>
                    <div class="overview-content">
                        <div class="overview-value" id="daysActive">-- days</div>
                        <div class="overview-label">Days Active (7 days)</div>
                    </div>
                </div>
                <div class="overview-card">
                    <div class="overview-icon danger"><i class="fas fa-hourglass-end"></i></div>
                    <div class="overview-content">
                        <div class="overview-value" id="longestSession">-- hrs</div>
                        <div class="overview-label">Longest Session</div>
                    </div>
                </div>
            </div>

            <div class="executive-summary">
                <h2 class="section-title">
                    <i class="fas fa-cogs"></i> Engine Parameters
                </h2>
                
                <div class="filter-section">
                    <div class="time-filter">
                        <button class="time-btn active" data-hours="24">Last 24h</button>
                        <button class="time-btn" data-hours="168">Last 7d</button>
                        <button class="time-btn" data-hours="720">Last 30d</button>
                        <button class="time-btn" data-hours="8760">Year to Date</button>
                    </div>
                    <div class="date-range">
                        <div class="date-selector">
                            <!-- Date picker dibuat otomatis oleh JavaScript -->
                        </div>
                        <button class="apply-btn" id="applyDateRange">Apply</button>
                    </div>
                </div>

                <div id="sensorsLoading" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading sensor data...
                </div>
                
                <div id="sensorsContainer" class="sensors-grid" style="display: none;"></div>
            </div>

            <div class="executive-summary">
                <h2 class="section-title">
                    <i class="fas fa-chart-line"></i> Sensor Trends
                </h2>

                <div id="chartContainer" class="chart-container">
                    <div class="chart-header">
                        <div>
                            <h3 class="chart-title" id="chartTitle">Sensor Data</h3>
                            <!-- Deskripsi bucket/interval ditampilkan di sini -->
                            <div id="chartDescription"></div>
                        </div>
                        <div class="chart-actions">
                            <button class="chart-action-btn" id="toggleExport"><i class="fas fa-download"></i> Export</button>
                            <button class="chart-action-btn" id="printChart"><i class="fas fa-print"></i> Print</button>
                        </div>
                    </div>
                    <div style="height: 300px; width: 100%;">
                        <canvas id="mainChart"></canvas>
                    </div>
                    
                    <div id="exportOptions" class="export-options">
                        <h4>Export Data</h4>
                        <div class="export-buttons">
                            <button class="export-btn" data-format="csv">CSV</button>
                            <button class="export-btn" data-format="json">JSON</button>
                            <button class="export-btn" data-format="png">PNG Image</button>
                            <button class="export-btn" data-format="pdf">PDF</button>
                        </div>
                    </div>
                </div>

                <div class="analysis-panel">
                    <div class="analysis-header">
                        <h3 class="analysis-title">
                            <i class="fas fa-wave-square"></i> FFT Spectrum Analysis
                        </h3>
                        <button class="chart-action-btn" id="recalculateFft" style="margin-left:auto;">
                            <i class="fas fa-sync-alt"></i> Recalculate
                        </button>
                    </div>
                    <div class="analysis-subtitle" id="fftSummary"></div>
                    <div class="fft-chart-wrap">
                        <canvas id="fftChart"></canvas>
                    </div>
                    <div id="fftInsights" class="fft-insights"></div>
                </div>
            </div>

        <!-- ══════════════════════════════════════════════════════════════
             CBM PANEL — diisi oleh public/js/cbm_panel.js secara otomatis
             ══════════════════════════════════════════════════════════════ -->
        <div class="executive-summary" style="margin-top: 20px; padding: 0;">
            <div id="cbmPanelContainer"></div>
        </div>

    </div><!-- /main-content -->

    <script src="js/sidebar.js"></script>
    <script src="js/reports.js"></script>
    <!-- CBM Panel — harus setelah reports.js supaya currentData & selectedSensors tersedia -->
    <script src="js/cbm_panel.js"></script>
</body>
</html>
