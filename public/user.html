<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GENSYS — User Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="js/auth-guard.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/alarm.css">
  <link rel="stylesheet" href="css/typography.css">

  <style>
    /* Styling Khusus Halaman User */
    .profile-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .profile-img-container {
        width: 120px;
        height: 120px;
        margin: 0 auto 15px;
        position: relative;
    }
    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .role-badge {
        background: var(--primary);
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
        margin-top: 5px;
    }
    .info-list {
        margin-top: 20px;
    }
    .info-item {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid #f1f5f9;
        font-size: 14px;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: #64748b; font-weight: 500; }
    .info-val { color: #1e293b; font-weight: 600; }
    
    .logout-area {
        margin-top: 30px;
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      
      <div class="topbar">
        <div class="topbar-title">User Profile</div>
        <div class="user-info" id="user-btn" style="cursor: pointer;">
           <i class="fas fa-user"></i> <span>Pengguna</span>
        </div>
      </div>

      <div style="display: flex; justify-content: center; margin-top: 20px;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 30px;">
            
            <div class="profile-header">
                <div class="profile-img-container">
                    <img id="prof-avatar" src="https://ui-avatars.com/api/?name=Pengguna&background=1745a5&color=fff&size=128" alt="Profile" class="profile-img">
                </div>
                <h2 id="prof-name" style="margin: 0; color: #1e293b;">Pengguna</h2>
                <div id="prof-role" class="role-badge">Employee Profile</div>
            </div>

            <div class="info-list">
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-envelope margin-right-5"></i> Email</span>
                    <span id="prof-email" class="info-val">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-id-badge"></i> Employee ID</span>
                    <span id="prof-employee-id" class="info-val">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-clock"></i> Shift</span>
                    <span id="prof-shift" class="info-val">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-map-marker-alt"></i> Location</span>
                    <span id="prof-location" class="info-val">-</span>
                </div>
            </div>

            <div class="logout-area">
                <button id="logout-btn" class="btn btn-del" style="width: 100%; padding: 12px; font-size: 14px;">
                    <i class="fas fa-sign-out-alt"></i> Sign Out
                </button>
            </div>

        </div>
      </div>

    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
      document.addEventListener("DOMContentLoaded", async () => {
          const currentUsername = localStorage.getItem('username') || 'Pengguna';
          const topbarName = document.querySelector('#user-btn span');
          if (topbarName) topbarName.innerText = currentUsername;

          const byId = (id) => document.getElementById(id);

          try {
              const res = await fetch(`/api/users/profile?username=${encodeURIComponent(currentUsername)}`);
              const json = await res.json();
              if (!json.success || !json.data) throw new Error(json.message || 'Data profil tidak ditemukan');

              const u = json.data;
              byId('prof-name').innerText = u.name || '-';
              byId('prof-email').innerText = u.email || '-';
              byId('prof-employee-id').innerText = u.employeeID || u.employeeID || u.idEmployee || 'EMP-2025-001';
              byId('prof-location').innerText = u.location || 'WS Bandung';
              byId('prof-shift').innerText = u.shift || '07.00-16.00';
              byId('prof-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name || 'Pengguna')}&background=1745a5&color=fff&size=128`;
              if (topbarName && u.name) topbarName.innerText = u.name;

              localStorage.setItem('username', u.name || currentUsername);
              const existingUser = localStorage.getItem('user');
              if (existingUser) {
                  try {
                      const parsed = JSON.parse(existingUser);
                      parsed.name = u.name || parsed.name;
                      parsed.email = u.email || parsed.email;
                      parsed.employeeID = u.employeeID || u.employeeId || u.idEmployee || parsed.employeeID;
                      parsed.location = u.location || parsed.location;
                      parsed.shift = u.shift || parsed.shift;
                      localStorage.setItem('user', JSON.stringify(parsed));
                  } catch (_) {}
              }
          } catch (err) {
              console.error('Gagal memuat profil user:', err);
          }
      });
  </script>
</body>
</html>
